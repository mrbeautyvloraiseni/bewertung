<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<title>MR Beauty</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MR Beauty">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="apple-touch-icon.PNG?v=100">
<link rel="apple-touch-icon-precomposed" href="apple-touch-icon.PNG?v=100">

<style>
html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    touch-action:none;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

.poster{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;

    display:block;

    user-select:none;
    -webkit-user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
}
</style>
</head>

<body>

<img src="poster.png?v=100" class="poster">

</body>
</html>
